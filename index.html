<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translator - CodeAlpha Task 1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🌐 Language Translation Tool</h1>

    <label for="inputText">Enter text:</label>
    <textarea id="inputText" rows="5" placeholder="Type something here..."></textarea>

    <div class="lang-row">
      <div class="lang-box">
        <label for="sourceLang">From:</label>
        <select id="sourceLang">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="bn">Bengali</option>
          <option value="ta">Tamil</option>
          <option value="te">Telugu</option>
          <option value="ur">Urdu</option>
        </select>
      </div>

      <!-- little swap button, just for fun/usability -->
      <button id="swapBtn" title="Swap languages">⇄</button>

      <div class="lang-box">
        <label for="targetLang">To:</label>
        <select id="targetLang">
          <option value="hi">Hindi</option>
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="bn">Bengali</option>
          <option value="ta">Tamil</option>
          <option value="te">Telugu</option>
          <option value="ur">Urdu</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button id="translateBtn">Translate</button>
      <button id="copyBtn">Copy Result</button>
      <button id="clearBtn">Clear</button>
    </div>

    <label for="outputText">Translated text:</label>
    <textarea id="outputText" rows="5" readonly placeholder="Translation will appear here..."></textarea>

    <p id="statusMsg"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
