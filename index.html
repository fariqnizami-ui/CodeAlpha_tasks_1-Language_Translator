<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeAlpha Language Translator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h1>🌍 AI Language Translator</h1>
<textarea id="inputText" placeholder="Enter text"></textarea>
<div class="row">
<select id="source"></select>
<button id="swap">⇄</button>
<select id="target"></select>
</div>
<div class="row">
<button id="translate">Translate</button>
<button id="clear">Clear</button>
</div>
<textarea id="outputText" readonly placeholder="Translation"></textarea>
<div class="row">
<button id="copy">📋 Copy</button>
<button id="speakIn">🔊 Speak Input</button>
<button id="speakOut">🔊 Speak Output</button>
</div>
<p id="status"></p>
</div>
<script src="script.js"></script>
</body></html>
